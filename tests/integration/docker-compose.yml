services:
  sshd:
    image: linuxserver/openssh-server:latest
    container_name: sshgate-test-sshd
    restart: "no"
    ports:
      - "2222:2222"
    environment:
      USER_NAME: testuser
      PUBLIC_KEY_FILE: /keys/sshgate_ed25519.pub
      PUID: "1000"
      PGID: "1000"
      SUDO_ACCESS: "false"
      PASSWORD_ACCESS: "false"
    volumes:
      - ./fixtures/keys:/keys:ro
